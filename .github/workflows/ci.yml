name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  build-test:
    # WPF net8.0-windows requires a Windows runner.
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v7

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore SystemCare.sln

      - name: Build (Release)
        run: dotnet build SystemCare.sln -c Release --no-restore

      - name: Test
        run: dotnet test SystemCare.sln -c Release --no-build --verbosity normal

      - name: Vulnerable dependency scan (informational)
        continue-on-error: true
        run: dotnet list SystemCare.sln package --vulnerable --include-transitive
